<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Card Renderer</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1d1b18;
      }

      body {
        display: grid;
        place-items: center;
        font-family: ui-serif, Georgia, serif;
      }

      #card {
        width: 900px;
        height: 1400px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 8%, rgba(255, 248, 225, 0.55), transparent 36%),
          linear-gradient(180deg, #d7c49d 0%, #b99f72 100%);
      }

      #card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 16% 18%, rgba(92, 61, 33, 0.08), transparent 16%),
          radial-gradient(circle at 78% 82%, rgba(70, 47, 30, 0.11), transparent 20%),
          repeating-linear-gradient(98deg, rgba(68, 48, 31, 0.035) 0 1px, transparent 1px 5px);
        mix-blend-mode: multiply;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #status {
        position: fixed;
        left: 12px;
        top: 12px;
        color: #f4ead2;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div id="card" aria-label="Character render card"></div>
    <div id="status">Loading...</div>

    <script type="module">
      import * as THREE from 'three';
      import { FBXLoader } from 'three/examples/jsm/loaders/FBXLoader.js';

      const CHARACTER_CONFIG = {
        wren: {
          name: 'Wren',
          manifest: '/models/wren/manifest.json',
          height: 1.78,
          yaw: Math.PI,
          cameraZ: 5.25,
          cameraY: 0.88,
          exposure: 1.38,
          tPose: true
        },
        marra: {
          name: 'Marra',
          manifest: '/models/marra/manifest.json',
          height: 1.66,
          yaw: 0,
          cameraZ: 5.05,
          cameraY: 0.84,
          exposure: 1.32,
          tPose: true
        },
        bram: {
          name: 'Old Bram',
          manifest: '/models/bram/manifest.json',
          height: 1.72,
          yaw: 0,
          cameraZ: 5.15,
          cameraY: 0.86,
          exposure: 1.34,
          tPose: true
        }
      };

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || 'wren';
      const config = CHARACTER_CONFIG[id] || CHARACTER_CONFIG.wren;
      const card = document.getElementById('card');
      const status = document.getElementById('status');

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(1);
      renderer.setSize(900, 1400, false);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = config.exposure;
      renderer.setClearColor(0x000000, 0);
      card.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(22, 900 / 1400, 0.05, 60);
      camera.position.set(0, config.cameraY, config.cameraZ);
      camera.lookAt(0, config.cameraY, 0);

      const key = new THREE.DirectionalLight(0xfff1cf, 2.9);
      key.position.set(2.3, 3.8, 4.6);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xb9d0e8, 1.0);
      fill.position.set(-2.8, 2.1, 2.4);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffd2a4, 1.15);
      rim.position.set(0.1, 2.8, -3.8);
      scene.add(rim);

      scene.add(new THREE.HemisphereLight(0xffe6c2, 0x3b413a, 1.0));
      scene.add(new THREE.AmbientLight(0xfff3df, 0.45));

      const pivot = new THREE.Group();
      scene.add(pivot);

      const loader = new FBXLoader();

      function materialize(model) {
        model.traverse((child) => {
          if (!child.isMesh) return;
          child.frustumCulled = false;
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          const converted = materials.map((mat) => {
            if (!mat) return mat;
            if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
            if (mat.isMeshStandardMaterial) {
              mat.roughness = Math.max(mat.roughness ?? 0.82, 0.72);
              mat.metalness = Math.min(mat.metalness ?? 0, 0.03);
              mat.envMapIntensity = 1.05;
              return mat;
            }
            const next = new THREE.MeshStandardMaterial({
              color: mat.color ? mat.color.clone() : new THREE.Color(0xcbb89d),
              map: mat.map || null,
              normalMap: mat.normalMap || null,
              roughness: 0.78,
              metalness: 0,
              transparent: mat.transparent || false,
              opacity: mat.opacity ?? 1
            });
            if (next.map) next.map.colorSpace = THREE.SRGBColorSpace;
            return next;
          });
          child.material = Array.isArray(child.material) ? converted : converted[0];
        });
      }

      function forceTPose(model) {
        const bones = [];
        model.traverse((obj) => {
          if (obj.isBone) bones.push(obj);
        });
        const byName = new Map(bones.map((bone) => [bone.name.toLowerCase(), bone]));
        const find = (...needles) => {
          const lower = needles.map((needle) => needle.toLowerCase());
          return bones.find((bone) => lower.some((needle) => bone.name.toLowerCase().includes(needle)));
        };

        const leftArm = byName.get('leftarm') || find('leftarm', 'left_arm', 'upperarm_l', 'upper_arm_l');
        const rightArm = byName.get('rightarm') || find('rightarm', 'right_arm', 'upperarm_r', 'upper_arm_r');
        const leftForeArm = byName.get('leftforearm') || find('leftforearm', 'left_forearm', 'forearm_l');
        const rightForeArm = byName.get('rightforearm') || find('rightforearm', 'right_forearm', 'forearm_r');
        const leftHand = byName.get('lefthand') || find('lefthand', 'left_hand', 'hand_l');
        const rightHand = byName.get('righthand') || find('righthand', 'right_hand', 'hand_r');

        // The Meshy/Mixamo bind pose is usually a low A-pose. These small,
        // mirrored local rotations lift the arms into a readable T-pose while
        // preserving the generated clothing and skinning.
        if (leftArm) leftArm.rotation.z += 0.72;
        if (rightArm) rightArm.rotation.z -= 0.72;
        if (leftForeArm) leftForeArm.rotation.z += 0.12;
        if (rightForeArm) rightForeArm.rotation.z -= 0.12;
        if (leftHand) leftHand.rotation.z += 0.05;
        if (rightHand) rightHand.rotation.z -= 0.05;

        return bones.map((bone) => bone.name);
      }

      function frameModel(model) {
        model.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        pivot.position.x = -center.x;
        pivot.position.z = -center.z;
        pivot.position.y = -box.min.y - 0.02;
        const armSpan = Math.max(size.x, 0.8);
        camera.position.z = Math.max(config.cameraZ, armSpan * 2.4);
        camera.lookAt(0, config.cameraY, 0);
      }

      async function main() {
        const manifest = await fetch(config.manifest, { cache: 'no-store' }).then((res) => res.json());
        const model = await loader.loadAsync(manifest.active);
        const targetHeight = config.height || manifest.height || 1.7;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        model.scale.setScalar(size.y > 0 ? targetHeight / size.y : 0.01);
        model.rotation.y = config.yaw;
        materialize(model);
        pivot.add(model);
        const boneNames = config.tPose ? forceTPose(model) : [];
        frameModel(model);
        renderer.render(scene, camera);
        status.textContent = `${config.name}: ready`;
        window.__cardReady = true;
        window.__characterInfo = { id, name: config.name, bones: boneNames };
      }

      main().catch((err) => {
        console.error(err);
        status.textContent = `${config.name}: failed`;
        window.__cardError = String(err?.stack || err);
      });
    </script>
  </body>
</html>
